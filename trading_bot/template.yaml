AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Algorithmic Trading Bot - SMA Crossover + RSI Strategy

Globals:
  Function:
    Timeout: 120
    Runtime: python3.11
    MemorySize: 256
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref TradeLogTable
        CONFIG_PATH: config.yaml

Parameters:
  AlpacaSecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing Alpaca API keys
  SNSTopicArn:
    Type: String
    Default: ""
    Description: SNS Topic ARN for trade alerts

Resources:
  TradingBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.handler
      CodeUri: .
      Description: Main trading bot Lambda - processes signals and executes trades
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          SECRETS_ARN: !Ref AlpacaSecretArn
          SNS_TOPIC_ARN: !Ref SNSTopicArn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TradeLogTable
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AlpacaSecretArn
        - Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref SNSTopicArn
      Events:
        MarketHoursSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(*/1 14-20 ? * MON-FRI *)
            Description: Run every minute during US market hours (9:30-16:00 ET = 14:30-21:00 UTC)
            Enabled: true

  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: trading-bot-dependencies
      Description: Python dependencies for trading bot
      ContentUri: dependencies/
      CompatibleRuntimes:
        - python3.11

  TradeLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: trading_bot_trades
      AttributeDefinitions:
        - AttributeName: trade_id
          AttributeType: S
        - AttributeName: symbol
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: trade_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: symbol-timestamp-index
          KeySchema:
            - AttributeName: symbol
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  TradingBotAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: TradingBot-Errors
      AlarmDescription: Alert when trading bot Lambda has errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref TradingBotFunction
      AlarmActions:
        - !Ref SNSTopicArn

  TradingBotDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: TradingBot-Dashboard
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${TradingBotFunction}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "${TradingBotFunction}"],
                  ["AWS/Lambda", "Duration", "FunctionName", "${TradingBotFunction}"]
                ],
                "period": 300,
                "title": "Trading Bot Lambda Metrics"
              }
            },
            {
              "type": "metric",
              "properties": {
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${TradeLogTable}"],
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${TradeLogTable}"]
                ],
                "period": 300,
                "title": "Trade Log DynamoDB Metrics"
              }
            }
          ]
        }

Outputs:
  TradingBotFunctionArn:
    Description: Trading Bot Lambda ARN
    Value: !GetAtt TradingBotFunction.Arn
  TradeLogTableName:
    Description: DynamoDB trade log table name
    Value: !Ref TradeLogTable
