AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Time-Series Revenue Forecasting with DeepAR

Parameters:
  SageMakerEndpointName:
    Type: String
    Default: revenue-forecast-endpoint
  SageMakerRoleArn:
    Type: String

Resources:
  ForecastApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  ForecastFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: api_handler.handler
      Runtime: python3.11
      CodeUri: .
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          SAGEMAKER_ENDPOINT: !Ref SageMakerEndpointName
      Policies:
        - Statement:
            - Effect: Allow
              Action: sagemaker:InvokeEndpoint
              Resource: !Sub "arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${SageMakerEndpointName}"
      Events:
        ForecastApi:
          Type: Api
          Properties:
            RestApiId: !Ref ForecastApi
            Path: /forecast
            Method: post

  RetrainFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: retrain_pipeline.handler
      Runtime: python3.11
      CodeUri: .
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          SAGEMAKER_ROLE_ARN: !Ref SageMakerRoleArn
          SAGEMAKER_ENDPOINT: !Ref SageMakerEndpointName
      Policies:
        - Statement:
            - Effect: Allow
              Action: sagemaker:*
              Resource: "*"
      Events:
        WeeklyRetrain:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 ? * MON *)
            Description: Weekly retraining every Monday at 6AM UTC

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "revenue-forecast-data-${AWS::AccountId}"

Outputs:
  ApiUrl:
    Value: !Sub "https://${ForecastApi}.execute-api.${AWS::Region}.amazonaws.com/prod/forecast"
  DataBucketName:
    Value: !Ref DataBucket
